<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJK TRPG Launcher</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060913;
      --panel: rgba(12, 18, 30, 0.78);
      --text: #eef5ff;
      --muted: #95a3b8;
      --cyan: #7ce7ff;
      --violet: #9d86ff;
      --border: rgba(124, 231, 255, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 231, 255, 0.12), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(157, 134, 255, 0.13), transparent 26%),
        linear-gradient(145deg, #03050b 0%, var(--bg) 50%, #090b16 100%);
    }

    main {
      width: min(720px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42), 0 0 36px rgba(124, 231, 255, 0.08);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--cyan);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 58ch;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    a {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      background: rgba(124, 231, 255, 0.08);
      text-decoration: none;
      font-weight: 800;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    a:hover {
      border-color: rgba(124, 231, 255, 0.58);
      background: rgba(124, 231, 255, 0.14);
      transform: translateY(-1px);
    }

    a.secondary {
      background: rgba(157, 134, 255, 0.08);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Occult Tactical AI GM</p>
    <h1>JJK TRPG Launcher</h1>
    <p>
      Choose the interface for this session. The Dify API key stays on the server-side
      proxy; both clients use the same deployed backend.
    </p>
    <nav aria-label="Choose TRPG client">
      <a href="/mobile/">Open Mobile</a>
      <a class="secondary" href="/desktop/">Open Desktop</a>
    </nav>
  </main>
</body>
</html>
